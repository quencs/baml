
[package]
name = "baml-client"
version = "0.1.0"
edition = "2021"
description = "Generated BAML client for Rust"
authors = ["BAML Generator"]
license = "MIT"

# Automatically generated by BAML - do not edit manually
# BAML version: 0.1.0

[dependencies]
# Core BAML runtime - using Git dependency until crates are published
baml-client-rust = { git = "https://github.com/BoundaryML/baml", branch = "aomi-labs/rust-client", package = "baml-client-rust" }
baml-types = { git = "https://github.com/BoundaryML/baml", branch = "aomi-labs/rust-client", package = "baml-types" }

# Async runtime
tokio = { version = "1.0", features = ["full"] }
futures = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

[dev-dependencies]
tokio-test = "0.4"

[features]
default = []

# Optional features
# tracing = ["baml-client-rust/tracing"]
# metrics = ["baml-client-rust/metrics"]

[lib]
name = "baml_client"
path = "src/lib.rs"

# Binary targets removed - this is a library crate

[package.metadata.baml]
version = "0.1.0"
generator = "rust"