# This crate only supports wasm32-unknown-unknown. Build with:
#   cargo build -p bridge_wasm --target wasm32-unknown-unknown
[package]
name = "bridge_wasm"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true

[lib]
crate-type = [ "cdylib", "rlib" ]

[dependencies]
baml_project = { workspace = true }
bex_factory = { workspace = true, features = [ "incremental" ] }
bridge_ctypes = { workspace = true }
sys_types = { workspace = true }
console_error_panic_hook = { workspace = true, optional = true }
indexmap = { workspace = true }
js-sys = { workspace = true }
prost = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }

[dev-dependencies]
wasm-bindgen-test = { workspace = true }

[features]
default = [ "console_error_panic" ]
console_error_panic = [ "console_error_panic_hook" ]

[lints]
workspace = true

[package.metadata.ci]
wasm_support = true
