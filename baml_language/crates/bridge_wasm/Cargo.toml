# This crate only supports wasm32-unknown-unknown. Build with:
#   cargo build -p bridge_wasm --target wasm32-unknown-unknown
[package]
name = "bridge_wasm"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true

[lib]
crate-type = [ "cdylib", "rlib" ]

[dependencies]
bex_heap = { workspace = true }
bex_project = { workspace = true }
bex_resource_types = { workspace = true }
bridge_ctypes = { workspace = true }
sys_types = { workspace = true }
async-trait = { workspace = true }
console_error_panic_hook = { workspace = true, optional = true }
indexmap = { workspace = true }
js-sys = { workspace = true }
log = { workspace = true }
lsp-server = { workspace = true }
prost = { workspace = true }
serde = { workspace = true, features = [ "derive" ] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tsify = { workspace = true }
vfs = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
wasm-logger = { workspace = true }

[dev-dependencies]
wasm-bindgen-test = { workspace = true }

[features]
default = [ "console_error_panic" ]
console_error_panic = [ "console_error_panic_hook" ]

[lints]
workspace = true

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[package.metadata.wasm-pack.profile.dev]
wasm-opt = false

[package.metadata.ci]
wasm_support = true
