[package]
name = "baml_program"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
ir_stub.workspace = true
baml_base.workspace = true
baml_jsonish.workspace = true
baml_jinja_runtime.workspace = true
baml_db.workspace = true
baml_project.workspace = true
baml_compiler_hir.workspace = true
baml_compiler_tir.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
indexmap.workspace = true
uuid.workspace = true
chrono.workspace = true

# Async runtime - conditionally compiled
tokio = { workspace = true, optional = true }

# HTTP client with WASM support
reqwest = { workspace = true, optional = true }

# Cancellation token
tokio-util = { workspace = true, optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["console"] }
getrandom = { version = "0.2", features = ["js"] }
uuid = { version = "1", features = ["v4", "serde", "js"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"
tokio = { workspace = true, features = ["rt", "macros"] }

[features]
default = ["native"]
native = ["tokio", "reqwest", "tokio-util"]
wasm = []
