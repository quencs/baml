[package]
name = "baml_bridge_cffi"
# Must match the version expected by baml-sys
version = "0.218.1"
edition.workspace = true
authors.workspace = true
license.workspace = true

[lib]
name = "baml_cffi"
crate-type = [ "cdylib" ]

[dependencies]
baml_base = { workspace = true }
baml_compiler_emit = { workspace = true }
baml_compiler_vir = { workspace = true }
baml_project = { workspace = true }
baml_type = { workspace = true }
baml_workspace = { workspace = true }
bex_engine = { workspace = true }
bex_external_types = { workspace = true }
bex_program = { workspace = true }
sys_native = { workspace = true }
sys_types = { workspace = true }
futures = { workspace = true }
indexmap = { workspace = true }
libc = { workspace = true }
once_cell = { workspace = true }
prost = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = [ "rt", "rt-multi-thread" ] }

[build-dependencies]
cbindgen = { workspace = true }
prost-build = { workspace = true }
protoc-bin-vendored = { workspace = true }
