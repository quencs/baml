[package]
name = "baml-playground-wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
console_error_panic_hook = { version = "0.1", optional = true }
wee_alloc = { version = "0.4", optional = true }
baml_project = { path = "../baml_project" }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[features]
default = []
console_error_panic = ["console_error_panic_hook"]
small_allocator = ["wee_alloc"]
