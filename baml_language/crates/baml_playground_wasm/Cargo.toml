[package]
name = "baml_playground_wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = [ "cdylib", "rlib" ]

[dependencies]
baml_db = { workspace = true }
baml_executor = { workspace = true }
baml_program = { workspace = true }
baml_project = { workspace = true }
console_error_panic_hook = { workspace = true, optional = true }
serde_json.workspace = true
wasm-bindgen = { workspace = true }
wee_alloc = { workspace = true, optional = true }

[dev-dependencies]
wasm-bindgen-test = { workspace = true }

[features]
default = [  ]
console_error_panic = [ "console_error_panic_hook" ]
small_allocator = [ "wee_alloc" ]
