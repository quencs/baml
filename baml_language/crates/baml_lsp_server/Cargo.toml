[package]
name = "baml_lsp_server"
version.workspace = true
edition.workspace = true
description = "Native LSP server for BAML using bex_project"

[features]
default = [  ]
native-tls = [ "reqwest/native-tls", "sys_native/native-tls" ]
rustls = [ "reqwest/rustls", "sys_native/rustls" ]

[dependencies]
bex_events_native = { workspace = true }
bex_heap = { workspace = true }
bex_project = { workspace = true }
bridge_ctypes = { workspace = true }
sys_native = { workspace = true, features = [ "bundle-http" ] }
sys_types = { workspace = true }
anyhow = { workspace = true }
axum = { workspace = true }
base64 = { workspace = true }
crossbeam = { workspace = true }
futures = { workspace = true }
indexmap = { workspace = true }
log = { workspace = true }
lsp-server = { workspace = true }
parking_lot = { workspace = true }
prost = { workspace = true }
regex = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = [ "sync", "rt-multi-thread", "fs", "net", "time", "macros" ] }
tokio-tungstenite = { workspace = true }
tower-http = { workspace = true }
tracing = { workspace = true }
tracing-log = { workspace = true }
tracing-subscriber = { workspace = true }
url = { workspace = true }
vfs = { workspace = true }
webbrowser = { workspace = true }

[package.metadata.ci]
wasm_support = false
