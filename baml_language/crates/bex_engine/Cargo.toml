[package]
name = "bex_engine"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
baml_type = { workspace = true }
bex_events = { workspace = true }
bex_external_types = { workspace = true }
bex_heap = { workspace = true }
bex_vm = { workspace = true }
bex_vm_types = { workspace = true }
sys_types = { workspace = true }
futures = { workspace = true }
indexmap = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = [ "sync", "macros" ] }
tokio-util = { workspace = true }
tracing = { workspace = true }

# Native-only: tokio runtime for spawning async tasks
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true, features = [ "sync", "rt", "macros" ] }

# WASM-only: wasm-bindgen-futures for spawning async tasks
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen-futures = { workspace = true }

[dev-dependencies]
baml_builtins = { workspace = true }
baml_tests = { workspace = true }
sys_llm = { workspace = true }
sys_native = { workspace = true, features = [ "bundle-http" ] }
anyhow = { workspace = true }
indexmap = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = [ "rt-multi-thread", "macros" ] }
wiremock = { workspace = true }

[lints]
workspace = true

[features]
default = [  ]
heap_debug = [ "bex_vm/heap_debug", "bex_heap/heap_debug", "bex_vm_types/heap_debug" ]
