[package]
name = "bridge_cffi"
# Must match the version expected by baml-sys
version = "0.218.1"
edition.workspace = true
authors.workspace = true
license.workspace = true

[lib]
# Library name is bridge_cffi; baml-sys/integ-tests still look for baml_cffi. For release,
# the artifact can be renamed (e.g. via mv) as needed when we switch to this bridge.
name = "bridge_cffi"
crate-type = [ "cdylib", "lib" ]

[features]
default = [ "bundle-http" ]
native-tls = [ "sys_native/native-tls" ]
rustls = [ "sys_native/rustls" ]
bundle-http = [ "sys_native/bundle-http" ]

[dependencies]
bex_events = { workspace = true }
bex_events_native = { workspace = true }
bex_project = { workspace = true }
bridge_ctypes = { workspace = true }
sys_native = { workspace = true }
sys_types = { workspace = true }
futures = { workspace = true }
indexmap = { workspace = true }
libc = { workspace = true }
once_cell = { workspace = true }
prost = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = [ "rt", "rt-multi-thread" ] }
tokio-util = { workspace = true }
vfs = { workspace = true }

[build-dependencies]
cbindgen = { workspace = true }

[package.metadata.ci]
wasm_support = false
