# dissimilar = "1.0.4"
# expect-test = "1.1.0"
# indoc.workspace = true
# either = "1.8.1"
# rstest = "0.22.0"
# walkdir = "2.5.0"
# wasm-logger = "0.2.0"

[[bin]]
name = "baml-cli"
