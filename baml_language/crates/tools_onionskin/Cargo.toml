[package]
name = "tools_onionskin"
version = { workspace = true }
publish = false
authors = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
homepage = { workspace = true }
documentation = { workspace = true }
repository = { workspace = true }
license = { workspace = true }

[[bin]]
name = "tools_onionskin"
path = "src/main.rs"

[dependencies]
baml_base = { workspace = true }
baml_compiler2_ast = { workspace = true }
baml_compiler2_hir = { workspace = true }
baml_compiler2_ppir = { workspace = true }
baml_compiler2_tir = { workspace = true }
baml_compiler2_visualization = { workspace = true }
baml_compiler_diagnostics = { workspace = true }
baml_compiler_emit = { workspace = true }
baml_compiler_hir = { workspace = true }
baml_compiler_lexer = { workspace = true }
baml_compiler_mir = { workspace = true }
baml_compiler_parser = { workspace = true }
baml_compiler_tir = { workspace = true }
baml_compiler_vir = { workspace = true }
baml_db = { workspace = true }
baml_fmt = { workspace = true }
baml_project = { workspace = true }
baml_type = { workspace = true }
baml_workspace = { workspace = true }
bex_vm = { workspace = true }
bex_vm_types = { workspace = true }
anyhow = { workspace = true }
arboard = { workspace = true }
clap = { workspace = true, features = [ "derive" ] }
crossterm = { workspace = true }
notify = { workspace = true }
ratatui = { workspace = true }
regex = { workspace = true }
rowan = { workspace = true }
salsa = { workspace = true }
similar = { workspace = true, features = [ "inline" ] }
text-size = { workspace = true }

[lints.clippy]
print_stdout = "allow"
print_stderr = "allow"

[features]
default = [  ]
heap_debug = [ "bex_vm/heap_debug", "bex_vm_types/heap_debug" ]

[package.metadata.ci]
wasm_support = false
