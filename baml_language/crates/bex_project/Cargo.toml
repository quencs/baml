[package]
name = "bex_project"
version = { workspace = true }
publish = false
authors = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
homepage = { workspace = true }
documentation = { workspace = true }
repository = { workspace = true }
license = { workspace = true }
description = "Reusable compile-and-run runtime for BAML programs"

[lib]
doctest = false

[lints]
workspace = true

[dependencies]
baml_base = { workspace = true }
baml_builtins = { workspace = true }
baml_compiler_diagnostics = { workspace = true }
baml_compiler_emit = { workspace = true }
baml_db = { workspace = true }
baml_fmt = { workspace = true }
baml_lsp_actions = { workspace = true }
baml_project = { workspace = true }
baml_workspace = { workspace = true }
bex_engine = { workspace = true }
bex_events = { workspace = true }
bex_external_types = { workspace = true }
bex_heap = { workspace = true }
bex_vm_types = { workspace = true }
sys_types = { workspace = true }
async-trait = { workspace = true }
crossbeam = { workspace = true }
log = { workspace = true }
lsp-server = { workspace = true }
lsp-types = { workspace = true }
paste = { workspace = true }
percent-encoding = { workspace = true }
regex = { workspace = true }
serde = { workspace = true, features = [ "derive" ] }
serde_json = { workspace = true }
text-size = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
vfs = { workspace = true }
web-time = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true, features = [ "sync", "rt" ] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen-futures = { workspace = true }
