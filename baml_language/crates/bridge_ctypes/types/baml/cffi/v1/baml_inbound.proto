syntax = "proto3";
package baml.cffi.v1;

option go_package = "./cffi";

// -----------------------------------------------------------------------------
// Handle types — shared between inbound and outbound
// -----------------------------------------------------------------------------

enum BamlHandleType {
  HANDLE_UNSPECIFIED = 0;
  HANDLE_UNKNOWN = 1; // opaque BEX heap handle (no type info)
  RESOURCE_FILE = 2;
  RESOURCE_SOCKET = 3;
  RESOURCE_HTTP_RESPONSE = 4;
  FUNCTION_REF = 5;
  ADT_MEDIA_IMAGE = 6;
  ADT_MEDIA_AUDIO = 7;
  ADT_MEDIA_VIDEO = 8;
  ADT_MEDIA_PDF = 9;
  ADT_MEDIA_GENERIC = 10;
  ADT_PROMPT_AST = 11;
  ADT_COLLECTOR = 12;
  ADT_TYPE = 13;
}

message BamlHandle {
  uint64 key = 1;
  BamlHandleType handle_type = 2;
}

// -----------------------------------------------------------------------------
// Inbound values — host language to engine (value-only, no type metadata)
// -----------------------------------------------------------------------------

// Core value type. No type metadata because not every language has union/class
// concepts (e.g. JS uses plain interfaces). Engine resolves types from function
// signatures.
message InboundValue {
  reserved 1;
  oneof value {
    string string_value = 2;
    int64 int_value = 3;
    double float_value = 4;
    bool bool_value = 5;
    InboundListValue list_value = 6;
    InboundMapValue map_value = 7;
    InboundClassValue class_value = 8;
    InboundEnumValue enum_value = 9;
    BamlHandle handle = 10;
  }
  // Absent oneof = null value.
}

message InboundListValue {
  repeated InboundValue values = 1;
}

message InboundMapValue {
  repeated InboundMapEntry entries = 1;
}

message InboundMapEntry {
  oneof key {
    string string_key = 1;
    int64 int_key = 2;
    bool bool_key = 3;
    InboundEnumValue enum_key = 5;
  }
  InboundValue value = 6;
}

message InboundClassValue {
  string name = 1;
  repeated InboundMapEntry fields = 2;
}

message InboundEnumValue {
  string name = 1;
  string value = 2;
}

// -----------------------------------------------------------------------------
// Function call protocol
// -----------------------------------------------------------------------------

message CallFunctionArgs {
  repeated InboundMapEntry kwargs = 1;
}

// CallAck is the engine's acknowledgment of an inbound call. It flows
// engine->host, but is defined in the inbound proto because it completes
// the inbound call contract (CallFunctionArgs request + CallAck response).
message CallAck {
  oneof response {
    string error = 1;
  }
}
