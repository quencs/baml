syntax = "proto3";
package baml.cffi.v1;

import "baml/cffi/v1/baml_inbound.proto";

option go_package = "./cffi";

// -----------------------------------------------------------------------------
// Outbound values — engine to host (type-rich)
// -----------------------------------------------------------------------------

message BamlOutboundValue {
  // we must include this because we might be a "string"
  // but in a container type like (string | int) and some languages
  // require we decode this.
  //
  // Required for BAML -> CFFI
  // But not for CFFI -> BAML (BAML always does type validation again at
  // boundaries)
  oneof value {
    BamlValueNull null_value = 2;
    string string_value = 3;
    int64 int_value = 4;
    double float_value = 5;
    bool bool_value = 6;
    BamlValueClass class_value = 7;
    BamlValueEnum enum_value = 8;
    BamlFieldTypeLiteral literal_value = 9;
    BamlValueList list_value = 11;
    BamlValueMap map_value = 12;
    BamlValueUnionVariant union_variant_value = 13;
    BamlValueChecked checked_value = 14;
    BamlValueStreamingState streaming_state_value = 15;
    BamlHandle handle_value = 16;
    BamlValueMedia media_value = 17;
    BamlValuePromptAst prompt_ast_value = 18;
  }
}

enum BamlTypeNamespace {
  INTERNAL = 0;
  TYPES = 1;
  STREAM_TYPES = 2;
  STREAM_STATE_TYPES = 3;
  CHECKED_TYPES = 4;
}

// wrapper for the name of a type
message BamlTypeName {
  BamlTypeNamespace namespace = 1;
  // the name of the type
  string name = 2;
}

message BamlValueNull {}

// Each variant as a message.
message BamlValueList {
  BamlFieldType item_type = 1;
  repeated BamlOutboundValue items = 2;
}

// A helper message to represent map entries (used also in Class).
message BamlOutboundMapEntry {
  string key = 1;
  BamlOutboundValue value = 2;
}

message BamlValueMap {
  BamlFieldType key_type = 1;
  BamlFieldType value_type = 2;
  repeated BamlOutboundMapEntry entries = 3;
}

message BamlValueClass {
  BamlTypeName name = 1;
  repeated BamlOutboundMapEntry fields = 2;
}

message BamlValueEnum {
  BamlTypeName name = 1;
  string value = 2;
  bool is_dynamic = 3;
}

// For the Rust variant `Union(Vec<BamlFieldType>, Box<BamlOutboundValue>)`
message BamlValueUnionVariant {
  BamlTypeName name = 1;
  bool is_optional = 2;
  bool is_single_pattern = 3;
  BamlFieldType self_type = 4;
  string value_option_name = 5;
  BamlOutboundValue value = 6;
}

message BamlValueChecked {
  BamlTypeName name = 1;
  BamlOutboundValue value = 2;
  repeated BamlCheckValue checks = 3;
}

// -----------------------------------------------------------------------------
// BamlMedia definitions
// -----------------------------------------------------------------------------

// We need to handle BamlMediaType. Since one variant is "Other(String)",
// we represent it as a message with an enum tag and an optional string.
enum MediaTypeEnum {
  IMAGE = 0;
  AUDIO = 1;
  PDF = 2;
  VIDEO = 3;
  OTHER = 4;
}

message BamlValueMedia {
  MediaTypeEnum media = 1;
  optional string mime_type = 2;
  oneof value {
    string url = 3;
    string base64 = 4;
    string file = 5;
  }
}

message BamlValuePromptAst {
  oneof value {
    BamlValuePromptAstSimple simple = 1;
    BamlValuePromptAstMessage message = 2;
    BamlValuePromptAstMultiple multiple = 3;
  }
}

message BamlValuePromptAstMessage {
  string role = 1;
  BamlValuePromptAstSimple content = 2;
  string metadata_as_json = 3;
}

message BamlValuePromptAstMultiple {
  repeated BamlValuePromptAst items = 1;
}

message BamlValuePromptAstSimple {
  oneof value {
    string string = 1;
    BamlValueMedia media = 2;
    BamlValuePromptAstSimpleMultiple multiple = 3;
  }
}

message BamlValuePromptAstSimpleMultiple {
  repeated BamlValuePromptAstSimple items = 1;
}

// -----------------------------------------------------------------------------
// BamlFieldType definition
// -----------------------------------------------------------------------------

// The wrapper message for BamlFieldType.
message BamlFieldType {
  oneof type {
    BamlFieldTypeString string_type = 1;
    BamlFieldTypeInt int_type = 2;
    BamlFieldTypeFloat float_type = 3;
    BamlFieldTypeBool bool_type = 4;
    BamlFieldTypeNull null_type = 5;
    BamlFieldTypeLiteral literal_type = 6;
    BamlFieldTypeMedia media_type = 7;
    BamlFieldTypeEnum enum_type = 8;
    BamlFieldTypeClass class_type = 9;
    BamlFieldTypeTypeAlias type_alias_type = 10;
    BamlFieldTypeList list_type = 11;
    BamlFieldTypeMap map_type = 12;
    BamlFieldTypeUnionVariant union_variant_type = 14;
    BamlFieldTypeOptional optional_type = 15;
    BamlFieldTypeChecked checked_type = 16;
    BamlFieldTypeStreamState stream_state_type = 17;
    BamlFieldTypeAny any_type = 18;
  }
}

// Simple marker messages for primitive types.
message BamlFieldTypeString {}
message BamlFieldTypeInt {}
message BamlFieldTypeFloat {}
message BamlFieldTypeBool {}
message BamlFieldTypeNull {}
message BamlFieldTypeAny {}

// Literal: wraps a literal oneof.
message BamlLiteralString {
  string value = 1;
}

message BamlLiteralInt {
  int64 value = 1;
}

message BamlLiteralBool {
  bool value = 1;
}

message BamlFieldTypeLiteral {
  oneof literal {
    BamlLiteralString string_literal = 1;
    BamlLiteralInt int_literal = 2;
    BamlLiteralBool bool_literal = 3;
  }
}

// For Media, reuse the BamlMediaType message.
message BamlFieldTypeMedia {
  MediaTypeEnum media = 1;
}

message BamlFieldTypeEnum {
  string name = 1;
}

message BamlFieldTypeClass {
  BamlTypeName name = 1;
}

message BamlFieldTypeTypeAlias {
  BamlTypeName name = 1;
}

message BamlFieldTypeList {
  BamlFieldType item_type = 1;
}

message BamlFieldTypeMap {
  BamlFieldType key_type = 1;
  BamlFieldType value_type = 2;
}

message BamlFieldTypeUnionVariant {
  BamlTypeName name = 1;
}

message BamlFieldTypeOptional {
  BamlFieldType value = 1;
}

message BamlFieldTypeChecked {
  BamlFieldType value = 1;
  repeated BamlCheckType checks = 2;
}

message BamlFieldTypeStreamState {
  BamlFieldType value = 1;
}

// -----------------------------------------------------------------------------
// BamlCheck definitions
// -----------------------------------------------------------------------------

message BamlCheckType {
  string name = 1;
}

message BamlCheckValue {
  string name = 1;
  string expression = 2;
  string status = 3;
  BamlOutboundValue value = 4;
}

// -----------------------------------------------------------------------------
// Other Enums
// -----------------------------------------------------------------------------

enum BamlStreamState {
  PENDING = 0;
  STARTED = 1;
  DONE = 2;
}

// -----------------------------------------------------------------------------
// BamlOutboundValue definitions
// -----------------------------------------------------------------------------

// The wrapper message for BamlValueStreamingState.
message BamlValueStreamingState {
  BamlOutboundValue value = 1;
  BamlStreamState state = 2;
  BamlTypeName name = 3;
}
