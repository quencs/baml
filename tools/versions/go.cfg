[bumpversion]
current_version = 0.90.1
commit = False
tag = False
parse = ^(?P<major>\d+)\.(?P<minor>\d+).(?P<patch>\d+)$
serialize = 
	{major}.{minor}.{patch}

[bumpversion:file:../engine/language_client_go/baml_go/lib.go]
search = VERSION            = "{current_version}"
replace = VERSION            = "{new_version}"
