[bumpversion]
current_version = 0.203.1
commit = False
tag = False
parse = ^(?P<major>\d+)\.(?P<minor>\d+).(?P<patch>\d+)$
serialize = 
	{major}.{minor}.{patch}

[bumpversion:file:../jetbrains/gradle.properties]
search = pluginVersion = {current_version}-beta
replace = pluginVersion = {new_version}-beta
