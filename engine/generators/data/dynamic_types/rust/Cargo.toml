[package]
name = "dynamic_types"
version = "0.1.0"
edition = "2021"

# Empty workspace table to exclude from parent workspace
[workspace]

[dependencies]
baml = { path = "../../../../../../languages/rust/baml", features = ["dev"] }
serde_json = "1"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }

[[bin]]
name = "dynamic_types"
path = "main.rs"
