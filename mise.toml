# Mise configuration for BAML development environment

[tools]
# Core languages
rust = "1.88.0"
go = "1.23.11"
python = "3.13"  # Will use uv for Python package management
ruby = "3.2.2"
node = "lts"     # For pnpm

# Rust tools
"cargo:bacon" = "latest"
"cargo:cross" = "latest"
"cargo:cargo-watch" = "latest"
"cargo:wasm-pack" = "0.13.1"

# Go tools
# "go:google.golang.org/protobuf/cmd/protoc-gen-go" = "v1.36.6"
"aqua:protocolbuffers/protobuf-go/protoc-gen-go" = "v1.36.6"
"go:golang.org/x/tools/cmd/goimports" = "latest"
"go:github.com/chrishrb/go-grip" = "latest"



# Python tools
"pipx:uv" = "latest"
"pipx:ruff" = "latest"
"pipx:maturin" = "latest"

# Node tools
"npm:pnpm" = "10.14.0"
"npm:@infisical/cli" = "latest"

[settings]
experimental = true
# idiomatic_version_file_enable_tools = ["node", "python", "ruby", "go"]
