# Mise configuration for BAML development environment

[tools]
# Core languages
# We use rustup to install Rust
# rust = "1.90.0"
rust = "system"
cargo = "system"
go = "1.23.11"
python = "3.13"     # Will use uv for Python package management
ruby = "3.2.2"
node = "lts"        # For pnpm
java = "temurin-23"

# Rust tools
cargo-binstall = "latest"
"cargo:bacon" = "latest"
"cargo:cross" = "latest"
"cargo:cargo-watch" = "latest"
"cargo:wasm-pack" = "0.13.1"

# Go tools
# Used by workflows via mise-action
"protoc-gen-go" = "1.34.1"
"go:golang.org/x/tools/cmd/goimports" = "0.36.0"

# Python tools
"pipx:uv" = "latest"
"pipx:ruff" = "latest"
"pipx:maturin" = "latest"

# Node tools
"npm:pnpm" = "10.14.0"
"npm:@infisical/cli" = "latest"

[settings]
auto_install_disable_tools = ["rust"]
experimental = false
# idiomatic_version_file_enable_tools = ["node", "python", "ruby", "go"]
