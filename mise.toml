# Mise configuration for BAML development environment

[tools]
# Core languages
# We use rustup to install Rust
# rust = "1.90.0"
rust = "system"
cargo = "system"
go = "1.23.11"
python = "3.13"     # Will use uv for Python package management
ruby = "3.2.2"
node = "lts"        # For pnpm
java = "temurin-23"

# Rust tools
#
# It's super important to have cargo-binstall! Even with `rust = "system"` and
# auto_install_disable_tools = ["rust"], mise will attempt to install clippy,
# and then fail because parallel rustup invocations for `cargo install` will
# race against each other. You'll know you're running into this if you see this:
#
#   error: component download failed for clippy-aarch64-unknown-linux-gnu: could not rename downloaded file from '/home/runner/.rustup/downloads/46512c61e217e613dc4d329fda8c6dde0d0ea94c4ae59c1ca2af9cf480458ff0.partial' to '/home/runner/.rustup/downloads/46512c61e217e613dc4d329fda8c6dde0d0ea94c4ae59c1ca2af9cf480458ff0': No such file or directory (os error 2)
#   error: component download failed for clippy-aarch64-unknown-linux-gnu: could not rename downloaded file from '/home/runner/.rustup/downloads/46512c61e217e613dc4d329fda8c6dde0d0ea94c4ae59c1ca2af9cf480458ff0.partial' to '/home/runner/.rustup/downloads/46512c61e217e613dc4d329fda8c6dde0d0ea94c4ae59c1ca2af9cf480458ff0': No such file or directory (os error 2)
#   mise ERROR cargo failed
cargo-binstall = "latest"
"cargo:bacon" = "latest"
"cargo:cross" = "latest"
"cargo:cargo-watch" = "latest"
"cargo:wasm-pack" = "0.13.1"

# Go tools
# Used by workflows via mise-action
"protoc-gen-go" = "1.34.1"
"go:golang.org/x/tools/cmd/goimports" = "0.36.0"

# Python tools
"pipx:uv" = "latest"
"pipx:ruff" = "latest"
"pipx:maturin" = "latest"

# Node tools
"npm:pnpm" = "10.14.0"
"npm:@infisical/cli" = "latest"

[settings]
auto_install_disable_tools = ["rust"]
# As of 2025-10-10: go backend is experimental. Enable it with `mise settings experimental=true`
experimental = true
# idiomatic_version_file_enable_tools = ["node", "python", "ruby", "go"]
