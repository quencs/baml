name: "Setup Development Tools"
description: "Setup common development tools"

inputs:
  install-mise:
    description: "Install mise version manager"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Remove unused tools (Linux only)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        # from https://carlosbecker.com/posts/github-actions-disk-space/ and
        # https://github.com/marketplace/actions/maximize-build-disk-space-only-remove-unwanted-software
        # frees up about ~20G space
        # we use rsync instead of rm -rf for faster deletion
        set -euxo pipefail
        mkdir -p /tmp/empty
        
        # Only delete directories if they exist
        [ -d /usr/share/dotnet ] && sudo rsync -a --delete /tmp/empty/ /usr/share/dotnet/
        [ -d /usr/local/lib/android ] && sudo rsync -a --delete /tmp/empty/ /usr/local/lib/android/
        [ -d /opt/ghc ] && sudo rsync -a --delete /tmp/empty/ /opt/ghc/
        [ -d /opt/hostedtoolcache/CodeQL ] && sudo rsync -a --delete /tmp/empty/ /opt/hostedtoolcache/CodeQL/
        
        df -h /
    - name: Setup mise
      uses: jdx/mise-action@v2
      with:
        install_args: "protoc-gen-go"
        cache: true
