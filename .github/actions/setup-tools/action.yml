name: "Setup Development Tools"
description: "Setup common development tools"

inputs:
  install-mise:
    description: "Install mise version manager"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Setup mise
      if: inputs.install-mise == 'true'
      uses: jdx/mise-action@v2
      with:
        cache: false
