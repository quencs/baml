name: Setup Java
description: Setup Java with caching and Gradle support

runs:
  using: composite
  steps:
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '23'
        distribution: 'temurin'
        cache: 'gradle'
        cache-dependency-path: |
          **/gradle/wrapper/gradle-wrapper.properties
          **/*.gradle*
          **/gradle.properties

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        # Enable Gradle build scans for better debugging
        add-job-summary: on-failure
        # Cache Gradle distributions and dependencies
        cache-read-only: ${{ github.ref != 'refs/heads/canary' }}
