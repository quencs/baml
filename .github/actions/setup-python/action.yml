name: "Setup Python"
description: "Setup Python with optional uv package manager"

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Setup uv
      uses: astral-sh/setup-uv@v5

    - name: Install Python project dependencies
      shell: bash
      run: |
        # Install maturin as a global tool (needed for building Python language client)
        echo "Installing maturin..."
        uv tool install maturin

        if [ -f "integ-tests/python/pyproject.toml" ]; then
          echo "Installing Python dependencies from integ-tests/python..."
          cd integ-tests/python
          uv sync --dev

          # Install ruff as a global tool so it's available in PATH
          uv tool install ruff

          cd - > /dev/null
          echo "Python dependencies installed successfully"
        else
          echo "Warning: integ-tests/python/pyproject.toml not found"
        fi
