# This action is specifically for typescript2/ which is a separate pnpm workspace.
# For the main repo workspace (typescript/, engine/, etc.), use setup-node instead.
#
# Key differences from setup-node:
# - Defaults to typescript2/ working directory and lockfile
# - No Turbo cache (typescript2 doesn't use Turbo for caching)
# - Uses Node 24 and actions/setup-node@v6

name: 'Setup Node.js for typescript2'
description: 'Setup Node.js with pnpm for the typescript2 workspace'

inputs:
  working-directory:
    description: 'Directory containing pnpm-lock.yaml and where to run pnpm install'
    required: false
    default: 'typescript2'
  pnpm-version:
    description: 'pnpm version to install'
    required: false
    default: '9.12.0'

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: pnpm
        cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
      working-directory: ${{ inputs.working-directory }}
