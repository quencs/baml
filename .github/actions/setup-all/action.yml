name: "Setup All Development Environment"
description: "Complete development environment setup using modular actions"

inputs:
  # Node.js inputs
  setup-node:
    description: "Setup Node.js and pnpm"
    required: false
    default: "true"
  node-version:
    description: "Node.js version to install"
    required: false
    default: "20"
  pnpm-version:
    description: "pnpm version to install"
    required: false
    default: "9.12.0"
  install-node-dependencies:
    description: "Install Node.js dependencies"
    required: false
    default: "true"
  enable-turbo-cache:
    description: "Enable Turbo build cache using GitHub Actions cache"
    required: false
    default: "true"

  # Rust inputs
  setup-rust:
    description: "Setup Rust toolchain"
    required: false
    default: "true"
  rust-toolchain:
    description: "Rust toolchain version"
    required: false
    default: "stable"
  rust-enable-wasm:
    description: "Enable WASM support for Rust"
    required: false
    default: "true"
  rust-targets:
    description: "Additional Rust targets (space-separated)"
    required: false
    default: ""
  rust-workspace:
    description: "Rust workspace path for caching"
    required: false
    default: "engine"
  rust-wasm-pack-version:
    description: "wasm-pack version to install (only used when enable-wasm is true)"
    required: false
    default: "0.14.0"
  rust-enable-cross:
    description: "Enable cross-rs for cross-compilation"
    required: false
    default: "true"

  # Python inputs
  setup-python:
    description: "Setup Python"
    required: false
    default: "true"
  python-version:
    description: "Python version to install"
    required: false
    default: "3.13"
  python-use-uv:
    description: "Use uv package manager for Python"
    required: false
    default: "true"

  # Go inputs
  setup-go:
    description: "Setup Go"
    required: false
    default: "true"
  go-version:
    description: "Go version to install"
    required: false
    default: "1.24"
  go-install-goimports:
    description: "Install goimports"
    required: false
    default: "true"

  # Tools inputs
  setup-tools:
    description: "Setup development tools"
    required: false
    default: "true"
  tools-install-mise:
    description: "Install mise version manager"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup development tools
      if: inputs.setup-tools == 'true'
      uses: ./.github/actions/setup-tools
      with:
        install-mise: ${{ inputs.tools-install-mise }}

    - name: Setup Node.js
      if: inputs.setup-node == 'true'
      uses: ./.github/actions/setup-node
      with:
        node-version: ${{ inputs.node-version }}
        pnpm-version: ${{ inputs.pnpm-version }}
        install-dependencies: ${{ inputs.install-node-dependencies }}
        enable-turbo-cache: ${{ inputs.enable-turbo-cache }}

    - name: Setup Rust
      if: inputs.setup-rust == 'true'
      uses: ./.github/actions/setup-rust
      with:
        toolchain: ${{ inputs.rust-toolchain }}
        enable-wasm: ${{ inputs.rust-enable-wasm }}
        targets: ${{ inputs.rust-targets }}
        workspace: ${{ inputs.rust-workspace }}
        wasm-pack-version: ${{ inputs.rust-wasm-pack-version }}
        enable-cross: ${{ inputs.rust-enable-cross }}

    - name: Setup Go
      if: inputs.setup-go == 'true'
      uses: ./.github/actions/setup-go
      with:
        go-version: ${{ inputs.go-version }}
        install-protoc-gen-go: ${{ inputs.go-install-protoc-gen-go }}
        install-goimports: ${{ inputs.go-install-goimports }}

    - name: Setup Python
      if: inputs.setup-python == 'true'
      uses: ./.github/actions/setup-python
      with:
        python-version: ${{ inputs.python-version }}
        use-uv: ${{ inputs.python-use-uv }}
