name: Pull Request Template
description: Template for creating pull requests
title: "[fix] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this pull request!
  - type: checkboxes
    id: issue-reference
    attributes:
      label: Issue Reference
      description: Please link to any related issues
      options:
        - label: This PR fixes/closes #[issue number]
          required: true
  - type: textarea
    id: changes
    attributes:
      label: Changes
      description: Please describe the changes proposed in this pull request
      placeholder: Describe your changes here...
      required: true
  - type: textarea
    id: testing
    attributes:
      label: Testing
      description: Please describe how you tested these changes
      placeholder: |
        - [ ] Unit tests added/updated
        - [ ] Manual testing performed
        - [ ] Tested in [environment]
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your changes
      placeholder: Add screenshots here...
  - type: checkboxes
    id: checklist
    attributes:
      label: PR Checklist
      description: Please ensure you've completed these items
      options:
        - label: I have read and followed the contributing guidelines
          required: true
        - label: My code follows the style guidelines of this project
          required: true
        - label: I have performed a self-review of my own code
          required: true
        - label: I have commented my code, particularly in hard-to-understand areas
          required: true
        - label: I have made corresponding changes to the documentation
          required: true
        - label: My changes generate no new warnings
          required: true
  - type: textarea
    id: additional-notes
    attributes:
      label: Additional Notes
      description: Add any other context about the PR here
      placeholder: Add any additional notes here...