name: 🔒 Security Vulnerability
description: Report a security vulnerability in BAML
title: "[security] "
labels: ["security"]
body:
  - type: textarea
    attributes:
      label: Vulnerability Description
      description: Please provide a detailed description of the security vulnerability.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: Please provide detailed steps to reproduce the vulnerability.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Impact
      description: What is the potential impact of this vulnerability?
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Severity
      description: How severe is this vulnerability?
      options:
        - Critical (remote code execution, data breach)
        - High (significant security impact)
        - Medium (limited security impact)
        - Low (minimal security impact)
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Product
      description: Which BoundaryML product is affected?
      options:
        - BAML Language
        - VS Code Playground
        - Boundary Studio
        - Prompt Fiddle
        - BAML Parser
        - Other
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional Information
      description: Any additional information that might be helpful.
  - type: textarea
    attributes:
      label: Discord Link
      description: If you're a Discord user, please provide your Discord username for easier communication.
  - type: checkboxes
    attributes:
      label: Code of Conduct
      description: By submitting this issue, I agree to follow the project's code of conduct.
      options:
        - label: I agree to follow the code of conduct
          required: true