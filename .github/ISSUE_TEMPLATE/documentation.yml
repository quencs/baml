name: 📚 Documentation
description: Request documentation improvements or report documentation issues
title: "[docs] "
labels: ["documentation"]
body:
  - type: textarea
    attributes:
      label: Documentation Issue
      description: What documentation needs to be improved or added?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Current Documentation
      description: If applicable, what is the current documentation that needs improvement?
  - type: textarea
    attributes:
      label: Proposed Changes
      description: What changes would you like to see in the documentation?
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Product
      description: Which BoundaryML product's documentation needs improvement?
      options:
        - BAML Language
        - VS Code Playground
        - Boundary Studio
        - Prompt Fiddle
        - BAML Parser
        - Other
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Documentation Type
      description: What type of documentation is this?
      options:
        - Getting Started Guide
        - API Reference
        - Tutorial
        - Example
        - Best Practices
        - Other
    validations:
      required: true
  - type: textarea
    attributes:
      label: Discord Link
      description: If you're a Discord user, please provide your Discord username for easier communication.
  - type: checkboxes
    attributes:
      label: Code of Conduct
      description: By submitting this issue, I agree to follow the project's code of conduct.
      options:
        - label: I agree to follow the code of conduct
          required: true