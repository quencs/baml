name: 🐞 Bug Report
description: Create a bug report to help us improve
title: "[bug] "
labels: ["unconfirmed bug"]
body:
  - type: textarea
    attributes:
      label: Describe the bug
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    attributes:
      label: To reproduce
      description: Describe how to reproduce your bug. Steps, code snippets, reproduction repos etc.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Logs
      description: Please provide any relevant logs or error messages.
  - type: textarea
    attributes:
      label: Additional information
      description: Add any other information related to the bug here, screenshots if applicable.
  - type: input
    attributes:
      label: Version
      description: Which version of BAML are you using?
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Product
      description: Which BoundaryML product are you using?
      options:
        - BAML Language
        - VS Code Playground
        - Boundary Studio
        - Prompt Fiddle
        - BAML Parser
        - Other
    validations:
      required: true
  - type: dropdown
    attributes:
      label: LLM Provider
      description: Which LLM provider are you using?
      options:
        - OpenAI
        - Anthropic
        - Google
        - Mistral
        - Cohere
        - Other
    validations:
      required: true
  - type: input
    attributes:
      label: LLM Model
      description: Which specific model are you using? (e.g., gpt-4-turbo-preview, claude-3-opus-20240229)
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Operating System
      description: Which operating system are you using?
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Deployment Method
      description: How are you deploying your application?
      options:
        - Local
        - AWS
        - GCP
        - Azure
        - Vercel
        - Netlify
        - Heroku
        - Other
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Language/Framework
      description: Which language or framework are you using?
      options:
        - Python
        - Node.js
        - React
        - Ruby
        - Go
        - Other
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Browser
      description: Which browser are you using?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
  - type: dropdown
    attributes:
      label: Code Editor
      description: Which code editor are you using?
      options:
        - VS Code
        - Cursor
        - Windsurf
        - JetBrains
        - Atom
        - Vim/Neovim
        - Other
  - type: input
    attributes:
      label: Editor Version
      description: What version of your code editor are you using? (e.g., VS Code 1.85.1)
  - type: textarea
    attributes:
      label: Discord Link
      description: If you're a Discord user, please provide your Discord username for easier communication.
  - type: checkboxes
    attributes:
      label: Code of Conduct
      description: By submitting this issue, I agree to follow the project's code of conduct.
      options:
        - label: I agree to follow the code of conduct
          required: true
