name: 🐞 Bug Report
description: Create a bug report to help us improve
title: "[bug] "
labels: ["unconfirmed bug"]
body:
  - type: dropdown
    attributes:
      label: Product
      description: Which Boundary product are you using?
      options:
        - BAML
        - VS Code Playground
        - Boundary Studio
        - Prompt Fiddle
        - Other
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the bug
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction Steps
      description: Describe how to reproduce your bug. Steps, code snippets, reproduction repos etc.
    validations:
      required: true
  - type: input
    attributes:
      label: BAML Version
      description: Which version of BAML are you using?
  - type: dropdown
    attributes:
      label: Language/Framework
      description: Which language or framework are you using?
      options:
        - Python
        - Node.js
        - React
        - Ruby
        - Go
        - Other
  - type: dropdown
    attributes:
      label: LLM Provider
      description: Which LLM provider are you using?
      options:
        - OpenAI
        - Anthropic
        - Google
        - Mistral
        - Cohere
        - Other
  - type: input
    attributes:
      label: LLM Model
      description: Which specific model are you using? (e.g., gpt-4-turbo-preview, claude-3-opus-20240229)
  - type: dropdown
    attributes:
      label: Operating System
      description: Which operating system are you using?
      options:
        - macOS
        - Windows
        - Linux
        - Other
  - type: dropdown
    attributes:
      label: Browser
      description: Which browser are you using?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
  - type: dropdown
    attributes:
      label: Code Editor
      description: Which code editor are you using?
      options:
        - VS Code
        - Cursor
        - Windsurf
        - JetBrains
        - Atom
        - Vim/Neovim
        - Other