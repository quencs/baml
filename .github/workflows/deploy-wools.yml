name: Deploy WOOLs to GitHub Pages

on:
  push:
    branches:
      - canary
    paths:
      - "wools/**"
      - ".github/workflows/deploy-wools.yml"
  pull_request:
    paths:
      - "wools/**"
      - ".github/workflows/deploy-wools.yml"
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install MkDocs and dependencies
        run: |
          pip install mkdocs-material mkdocs-awesome-pages-plugin

      - name: Build MkDocs
        working-directory: wools
        run: mkdocs build

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/canary'
        uses: actions/upload-pages-artifact@v3
        with:
          path: wools/site

      - name: Setup Node.js
        if: github.event_name == 'pull_request'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_SAM }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WOOLS }}
        run: |
          npm install -g vercel
          vercel deploy wools/site --token=${{ secrets.VERCEL_TOKEN_SAM }} --yes > preview_url.txt
          echo "URL=$(cat preview_url.txt)" >> $GITHUB_ENV

      - name: Comment Preview URL
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v3.0.1
        with:
          message: |
            🐑 **WOOLs Preview**: ${{ env.URL }}

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/canary'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
