name: Test Go Client Windows Support

permissions:
  contents: read

on:
  pull_request:
    branches: [ canary, main ]
    paths:
      - 'engine/language_client_go/**'
      - 'engine/language_client_cffi/**'
      - 'engine/baml-lib/**'
      - '.github/workflows/test-go-windows.yml'
  push:
    branches: [ hellovai/go-windows-support ]
  workflow_dispatch:

jobs:
  test-windows:
    name: Test Windows Go Client
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false  # Disable cache to avoid path issues

      - name: Setup Protoc (Windows)
        shell: bash
        run: |
          # Download protoc directly to avoid rate limiting
          PROTOC_VERSION="27.1"
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-win64.zip"
          unzip -q protoc-${PROTOC_VERSION}-win64.zip -d $HOME/.local
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          rm protoc-${PROTOC_VERSION}-win64.zip

      - name: Install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.34.1
          echo "$HOME/go/bin" >> $GITHUB_PATH
        shell: bash

      - name: Build CFFI Library
        run: |
          cargo build --release -p baml_cffi
        working-directory: engine
        shell: bash

      - name: List built artifacts
        run: |
          echo "Listing release directory:"
          dir engine\target\release\*.dll
        shell: cmd

      - name: Set BAML Library Path
        run: |
          echo "BAML_LIBRARY_PATH=${{ github.workspace }}\engine\target\release\baml_cffi.dll" >> $GITHUB_ENV
        shell: bash

      - name: Run Go Tests
        run: |
          go test -v ./...
        working-directory: engine/language_client_go
        env:
          BAML_LOG: DEBUG

      - name: Build Go Package
        run: |
          go build ./...
        working-directory: engine/language_client_go

  test-unix:
    name: Test Unix Go Client
    strategy:
      fail-fast: false  # Don't cancel other jobs if one fails
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false  # Disable cache to avoid path issues

      - name: Setup Protoc (Unix)
        run: |
          # Download protoc directly to avoid rate limiting
          PROTOC_VERSION="27.1"
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            PROTOC_ZIP="protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          else
            PROTOC_ZIP="protoc-${PROTOC_VERSION}-osx-universal_binary.zip"
          fi
          curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${PROTOC_ZIP}"
          unzip -q ${PROTOC_ZIP} -d $HOME/.local
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          rm ${PROTOC_ZIP}

      - name: Install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.34.1

      - name: Build CFFI Library
        run: |
          cargo build --release -p baml_cffi
        working-directory: engine

      - name: List built artifacts
        run: |
          echo "Listing release directory:"
          ls -la engine/target/release/libbaml_cffi.* || true
          ls -la engine/target/release/baml_cffi.* || true

      - name: Set BAML Library Path (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "BAML_LIBRARY_PATH=${{ github.workspace }}/engine/target/release/libbaml_cffi.so" >> $GITHUB_ENV

      - name: Set BAML Library Path (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "BAML_LIBRARY_PATH=${{ github.workspace }}/engine/target/release/libbaml_cffi.dylib" >> $GITHUB_ENV

      - name: Run Go Tests
        run: |
          go test -v ./...
        working-directory: engine/language_client_go
        env:
          BAML_LOG: DEBUG

      - name: Build Go Package
        run: |
          go build ./...
        working-directory: engine/language_client_go

  cross-compile-test:
    name: Test Cross-Compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false  # Disable cache to avoid path issues

      - name: Test Cross-Compilation to Windows (CGO disabled)
        run: |
          # This is expected to fail due to CGO requirements
          # We're testing that the error message is clear
          if GOOS=windows go build ./... 2>&1 | grep -q "build constraints exclude all Go files"; then
            echo "✓ Cross-compilation correctly fails with expected CGO error"
            exit 0
          else
            echo "✗ Unexpected cross-compilation behavior"
            exit 1
          fi
        working-directory: engine/language_client_go

      - name: Verify Unix Build Still Works
        run: |
          go build ./...
        working-directory: engine/language_client_go