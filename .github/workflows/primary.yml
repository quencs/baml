name: BAML Runtime

on:
  pull_request:
    branches:
      - canary
  push:
    paths:
      - "engine/**"
      - ".github/workflows/primary.yml"
      - "typescript/**"
    branches:
      - canary
      - greg/lsp
  # need to run this periodically on the default branch to populate the build cache
  schedule:
    # daily at 2am PST
    - cron: 0 10 * * *
  merge_group:
    types: [checks_requested]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  repository-projects: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          cache-dependency-path: |
            typescript/**/pnpm-lock.yaml
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install protoc-gen-go
        run: go install github.com/golang/protobuf/protoc-gen-go@latest
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check TS Lint
        run: pnpm format:ci
      - name: Build playground
        run: pnpm build:playground
      - name: Check Rust Formatter
        # rustfmt can only run unstable features on stable toolchains if passed
        # through CLI. We don't want to download 2 toolchains just for this.
        run: cargo fmt --check -- --config imports_granularity="Crate" --config group_imports="StdExternalCrate"
        working-directory: engine
      - name: Check Rust Lint (Clippy)
        run: RUSTFLAGS="-A unused -D warnings" cargo clippy
        working-directory: engine
      - name: Check Rust Lint WASM (Clippy)
        run: RUSTFLAGS="-A unused -D warnings" cargo clippy --target wasm32-unknown-unknown
        working-directory: engine/baml-schema-wasm
  test_node_generator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21.x"
      - name: Install protoc-gen-go
        run: go install github.com/golang/protobuf/protoc-gen-go@latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # This step is necessary to guarantee that the language server has a frontend to embed.
      # Is also included in build and integ-tests steps.
      - name: Build playground
        run: pnpm build:playground
      # ------------------------------------------------------------
      - name: Build language client
        run: pnpm --filter=@baml/language-client-typescript build:debug
      - name: Install Node
        run: pnpm install --frozen-lockfile
        working-directory: integ-tests/typescript
      - name: Test Node Generator
        run: |
          pnpm generate || (echo "::error:: merge canary and run codegen again" && exit 1)
        working-directory: integ-tests/typescript
      - name: Ensure No Changes
        run: |
          git diff --exit-code || (echo "::error:: merge canary and run codegen again" && exit 1)
      - name: Test Node Generator (1 of 3)
        run: |
          pnpm generate || (echo "::error:: merge canary and run codegen again" && exit 1)
        working-directory: integ-tests/typescript
      - name: Ensure No Changes (1 of 3)
        run: |
          git diff --exit-code || (echo "::error:: merge canary and run codegen again" && exit 1)
      - name: Test Node Generator (2 of 3)
        run: |
          pnpm generate || (echo "::error:: merge canary and run codegen again" && exit 1)
        working-directory: integ-tests/typescript
      - name: Ensure No Changes (2 of 3)
        run: |
          git diff --exit-code || (echo "::error:: merge canary and run codegen again" && exit 1)
      - name: Test Node Generator (3 of 3)
        run: |
          pnpm generate || (echo "::error:: merge canary and run codegen again" && exit 1)
        working-directory: integ-tests/typescript
      - name: Ensure No Changes (3 of 3)
        run: |
          git diff --exit-code || (echo "::error:: merge canary and run codegen again" && exit 1)
  build-wasm:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: jdx/mise-action@v2
        - uses: dtolnay/rust-toolchain@stable
          with:
            toolchain: stable
        - run: rustup target add wasm32-unknown-unknown
        - uses: Swatinem/rust-cache@v2
          with:
            workspaces: engine
        - name: Build rust for wasm32
          run: cargo build --target=wasm32-unknown-unknown
          working-directory: engine/baml-schema-wasm
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - uses: actions/setup-go@v4
        with:
          go-version: '1.24'
      - name: Install protoc-gen-go
        run: go install github.com/golang/protobuf/protoc-gen-go@latest
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest
      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install ruff
        run: pip install ruff
      - uses: actions/setup-node@v4
        with:
          node-version: '24.2.0'
      - name: Install prettier
        run: npm install -g prettier
      # Ruby is still a wip
      # - uses: ruby/setup-ruby@v1
      #   with:
      #     ruby-version: '3.4.4'
      #     bundler-cache: true
      # - name: Install Ruby dependencies
      #   run: |
      #     gem install sorbet sorbet-runtime
      #     bundle add tapioca --group "development, test" --require false
      #     bundle install
      # - name: Initialize Sorbet with Tapioca
      #   env:
      #     SRB_YES: "1"
      #   run: bundle exec tapioca init
      - name: Build playground
        run: pnpm build:playground
      - name: Test Rust
        # skip doctests & integration tests (the latter require OPENAI_API_KEY and ANTHROPIC_API_KEY to be set)
        run: cargo test --lib
        working-directory: engine
  integ-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21.x"
      - name: Install protoc-gen-go
        run: go install github.com/golang/protobuf/protoc-gen-go@latest
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Build playground
        run: pnpm build:playground
      - name: run python tests
        run: |
          cd integ-tests/python
          ./run_tests.sh
  build-cli:
    if: github.event_name == 'release'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Build CLI
        run: cargo build --release --bin baml-cli --target ${{ matrix.target }}
        working-directory: engine
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: baml-cli-${{ matrix.target }}
          path: engine/target/release/baml-cli*
