name: CI - BAML Language
permissions:
  contents: read
  id-token: write
  pull-requests: write
on:
  push:
    branches: [main, canary]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10

jobs:
  determine_changes:
    name: "Determine changes"
    runs-on: ubuntu-latest
    outputs:
      # Flag that is raised when any code in baml_language is changed
      code: ${{ steps.check_code.outputs.changed }}
      # Flag for lexer changes
      lexer: ${{ steps.check_lexer.outputs.changed }}
      # Flag for parser changes
      parser: ${{ steps.check_parser.outputs.changed }}
      # Flag for HIR changes
      hir: ${{ steps.check_hir.outputs.changed }}
      # Flag for THIR changes
      thir: ${{ steps.check_thir.outputs.changed }}
      # Flag for codegen changes
      codegen: ${{ steps.check_codegen.outputs.changed }}
      # Flag for BEP changes
      beps: ${{ steps.check_beps.outputs.changed }}
      # Flag for docs/frontend changes
      docs: ${{ steps.check_docs.outputs.changed }}
      # Flag for engine changes (BAML Runtime)
      engine: ${{ steps.check_engine.outputs.changed }}
      # Flag for TypeScript changes
      typescript: ${{ steps.check_typescript.outputs.changed }}
      # Flag for Python integration tests changes
      python_integ: ${{ steps.check_python_integ.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine merge base
        id: merge_base
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref || 'canary' }}
        run: |
          sha=$(git merge-base HEAD "origin/${BASE_REF}")
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Check if code changed
        id: check_code
        env:
          MERGE_BASE: ${{ steps.merge_base.outputs.sha }}
        run: |
          if git diff --quiet "${MERGE_BASE}...HEAD" -- \
            ':baml_language/**' \
            ':.github/workflows/ci.yaml' \
            ':.github/workflows/cargo-tests.reusable.yaml' \
          ; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if lexer code changed
        id: check_lexer
        env:
          MERGE_BASE: ${{ steps.merge_base.outputs.sha }}
        run: |
          if git diff --quiet "${MERGE_BASE}...HEAD" -- \
            ':baml_language/crates/baml_lexer/**' \
            ':baml_language/crates/baml_base/**' \
            ':baml_language/Cargo.toml' \
            ':baml_language/Cargo.lock' \
          ; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if parser code changed
        id: check_parser
        env:
          MERGE_BASE: ${{ steps.merge_base.outputs.sha }}
        run: |
          if git diff --quiet "${MERGE_BASE}...HEAD" -- \
            ':baml_language/crates/baml_parser/**' \
            ':baml_language/crates/baml_syntax/**' \
            ':baml_language/crates/baml_lexer/**' \
            ':baml_language/crates/baml_base/**' \
          ; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if HIR code changed
        id: check_hir
        env:
          MERGE_BASE: ${{ steps.merge_base.outputs.sha }}
        run: |
          if git diff --quiet "${MERGE_BASE}...HEAD" -- \
            ':baml_language/crates/baml_hir/**' \
            ':baml_language/crates/baml_workspace/**' \
            ':baml_language/crates/baml_parser/**' \
            ':baml_language/crates/baml_base/**' \
          ; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if THIR code changed
        id: check_thir
        env:
          MERGE_BASE: ${{ steps.merge_base.outputs.sha }}
        run: |
          if git diff --quiet "${MERGE_BASE}...HEAD" -- \
            ':baml_language/crates/baml_thir/**' \
            ':baml_language/crates/baml_hir/**' \
            ':baml_language/crates/baml_base/**' \
          ; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if codegen code changed
        id: check_codegen
        env:
          MERGE_BASE: ${{ steps.merge_base.outputs.sha }}
        run: |
          if git diff --quiet "${MERGE_BASE}...HEAD" -- \
            ':baml_language/crates/baml_codegen/**' \
            ':baml_language/crates/baml_thir/**' \
            ':baml_language/crates/baml_base/**' \
          ; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if BEPs changed
        id: check_beps
        env:
          MERGE_BASE: ${{ steps.merge_base.outputs.sha }}
        run: |
          if git diff --quiet "${MERGE_BASE}...HEAD" -- \
            ':beps/**' \
            ':.github/workflows/beps.reusable.yaml' \
          ; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if docs changed
        id: check_docs
        env:
          MERGE_BASE: ${{ steps.merge_base.outputs.sha }}
        run: |
          if git diff --quiet "${MERGE_BASE}...HEAD" -- \
            ':fern/**' \
            ':typescript/apps/ask-baml-client/**' \
            ':typescript/apps/sage-backend/**' \
            ':.github/workflows/docs.reusable.yaml' \
          ; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if engine changed
        id: check_engine
        env:
          MERGE_BASE: ${{ steps.merge_base.outputs.sha }}
        run: |
          if git diff --quiet "${MERGE_BASE}...HEAD" -- \
            ':engine/**' \
            ':.github/workflows/ci.yaml' \
            ':.github/workflows/primary.yml' \
            ':.github/actions/setup-rust/**' \
            ':.github/actions/setup-go/**' \
            ':.github/actions/setup-tools/**' \
          ; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if TypeScript changed
        id: check_typescript
        env:
          MERGE_BASE: ${{ steps.merge_base.outputs.sha }}
        run: |
          if git diff --quiet "${MERGE_BASE}...HEAD" -- \
            ':typescript/**' \
            ':integ-tests/typescript/**' \
            ':.github/workflows/ci.yaml' \
            ':.github/workflows/primary.yml' \
            ':.github/actions/setup-node/**' \
          ; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if Python integration tests changed
        id: check_python_integ
        env:
          MERGE_BASE: ${{ steps.merge_base.outputs.sha }}
        run: |
          if git diff --quiet "${MERGE_BASE}...HEAD" -- \
            ':integ-tests/python/**' \
            ':engine/**' \
            ':.github/workflows/ci.yaml' \
            ':.github/workflows/primary.yml' \
            ':.github/actions/setup-python/**' \
          ; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # Call reusable workflows
  cargo-tests:
    name: "Cargo Tests"
    needs: determine_changes
    uses: ./.github/workflows/cargo-tests.reusable.yaml
    with:
      code_changed: ${{ needs.determine_changes.outputs.code }}
      run_all: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/canary' }}
    secrets: inherit

  beps:
    name: "BEPs"
    needs: determine_changes
    uses: ./.github/workflows/beps.reusable.yaml
    with:
      beps_changed: ${{ needs.determine_changes.outputs.beps }}
      is_canary: ${{ github.ref == 'refs/heads/canary' }}
      is_pr: ${{ github.event_name == 'pull_request' }}
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      deployments: write

  docs:
    name: "Docs"
    needs: determine_changes
    uses: ./.github/workflows/docs.reusable.yaml
    with:
      docs_changed: ${{ needs.determine_changes.outputs.docs }}
      is_canary: ${{ github.ref == 'refs/heads/canary' }}
    secrets: inherit
    permissions: write-all

  benchmarks-instrumented:
    name: "benchmarks instrumented (baml)"
    runs-on: codspeed-macro
    needs: determine_changes
    if: |
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/canary' ||
        contains(github.event.pull_request.body, 'RUN_CODSPEED=1') ||
        needs.determine_changes.outputs.lexer == 'true' ||
        needs.determine_changes.outputs.parser == 'true' ||
        needs.determine_changes.outputs.hir == 'true' ||
        needs.determine_changes.outputs.thir == 'true' ||
        needs.determine_changes.outputs.codegen == 'true'
      )
    timeout-minutes: 20
    steps:
      - name: "Checkout Branch"
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "baml_language -> target"

      - name: "Install Rust toolchain"
        run: rustup show
        working-directory: baml_language

      - name: "Install codspeed"
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed

      - name: "Build benchmarks"
        run: cargo codspeed build -p baml_tests
        working-directory: baml_language

      - name: "Run benchmarks"
        uses: CodSpeedHQ/action@v3
        with:
          mode: walltime
          run: cd baml_language && cargo codspeed run
          token: ${{ secrets.CODSPEED_TOKEN }}

  # BAML Runtime checks (merged from primary.yml)
  runtime-lint:
    name: "BAML Runtime / Lint"
    runs-on: ubuntu-latest
    needs: determine_changes
    if: |
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/canary' ||
        needs.determine_changes.outputs.engine == 'true' ||
        needs.determine_changes.outputs.typescript == 'true' ||
        needs.determine_changes.outputs.python_integ == 'true'
      )
    strategy:
      matrix:
        check:
          [typescript-lint, rust-format, rust-lint, rust-lint-wasm, python-lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Tools
        uses: ./.github/actions/setup-tools

      # Setup Node.js for TypeScript lint
      - name: Setup Node.js
        if: matrix.check == 'typescript-lint' && needs.determine_changes.outputs.typescript == 'true'
        uses: ./.github/actions/setup-node

      # Setup Rust for Rust checks
      - name: Setup Rust
        if: contains(matrix.check, 'rust') && needs.determine_changes.outputs.engine == 'true'
        uses: ./.github/actions/setup-rust
        with:
          enable-wasm: ${{ matrix.check == 'rust-lint-wasm' && 'true' || 'false' }}

      # Install protoc-gen-go for rust-lint (needed by baml_cffi build.rs)
      - name: Setup Go
        if: matrix.check == 'rust-lint' && needs.determine_changes.outputs.engine == 'true'
        uses: ./.github/actions/setup-go

      - name: Setup Python
        if: matrix.check == 'python-lint' && needs.determine_changes.outputs.python_integ == 'true'
        uses: ./.github/actions/setup-python
        with:
          cache: "false"

      - name: Run TypeScript lint
        if: matrix.check == 'typescript-lint' && needs.determine_changes.outputs.typescript == 'true'
        run: pnpm format:ci

      - name: Run Rust format check
        if: matrix.check == 'rust-format' && needs.determine_changes.outputs.engine == 'true'
        run: |
          # Ensure rustfmt is installed for the mise-managed toolchain
          rustup component add rustfmt || true
          cargo fmt --check -- --config imports_granularity=Crate --config group_imports=StdExternalCrate
        working-directory: engine

      - name: Run Rust lint (Clippy)
        if: matrix.check == 'rust-lint' && needs.determine_changes.outputs.engine == 'true'
        run: RUSTFLAGS="-A unused -D warnings" cargo clippy --workspace -- -D clippy::print_stdout
        working-directory: engine

      - name: Run Rust lint WASM (Clippy)
        if: matrix.check == 'rust-lint-wasm' && needs.determine_changes.outputs.engine == 'true'
        run: RUSTFLAGS="-A unused -D warnings" cargo clippy --target wasm32-unknown-unknown
        working-directory: engine/baml-schema-wasm

      - name: Run Python lint
        if: matrix.check == 'python-lint' && needs.determine_changes.outputs.python_integ == 'true'
        run: |
          cd integ-tests/python && uv run ruff check .

  runtime-typecheck:
    name: "BAML Runtime / Typecheck"
    runs-on: ubuntu-latest
    needs: determine_changes
    if: |
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/canary' ||
        needs.determine_changes.outputs.engine == 'true' ||
        needs.determine_changes.outputs.typescript == 'true'
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Tools
        uses: ./.github/actions/setup-tools

      # Setup Node.js for TypeScript lint
      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      # Setup Rust for Rust checks
      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          enable-wasm: true

      # Install protoc-gen-go
      - name: Setup Go
        uses: ./.github/actions/setup-go

      - name: Run typecheck for typescript and rust
        run: pnpm typecheck --force

  runtime-build-wasm:
    name: "BAML Runtime / Build WASM"
    runs-on: ubuntu-latest
    needs: determine_changes
    if: |
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/canary' ||
        needs.determine_changes.outputs.engine == 'true'
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Tools
        uses: ./.github/actions/setup-tools

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown
          enable-wasm: true

      - name: Build rust for wasm32
        run: cargo build --target=wasm32-unknown-unknown
        working-directory: engine/baml-schema-wasm

  runtime-test-generators:
    name: "BAML Runtime / Test Generators"
    runs-on: ubuntu-latest
    needs: determine_changes
    if: |
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/canary' ||
        needs.determine_changes.outputs.engine == 'true' ||
        needs.determine_changes.outputs.typescript == 'true'
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Tools
        uses: ./.github/actions/setup-tools

      - name: Setup Node.js
        uses: ./.github/actions/setup-node

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          enable-wasm: false
          enable-cross: false
          cache-on-failure: true

      - name: Setup Go
        uses: ./.github/actions/setup-go
        with:
          install-goimports: true
          install-protoc-gen-go: false

      - name: Test Generators (1 of 3)
        run: |
          pnpm build:debug && pnpm generate || (echo "::error:: merge canary and run codegen again" && exit 1)
        working-directory: integ-tests/typescript

      - name: Ensure No Changes (1 of 3)
        run: |
          git diff --exit-code || (echo "::error:: merge canary and run codegen again" && exit 1)

      - name: Test Generators (2 of 3)
        run: |
          pnpm build:debug && pnpm generate || (echo "::error:: merge canary and run codegen again" && exit 1)
        working-directory: integ-tests/typescript

      - name: Ensure No Changes (2 of 3)
        run: |
          git diff --exit-code || (echo "::error:: merge canary and run codegen again" && exit 1)

      - name: Test Generators (3 of 3)
        run: |
          pnpm build:debug && pnpm generate || (echo "::error:: merge canary and run codegen again" && exit 1)
        working-directory: integ-tests/typescript

      - name: Ensure No Changes (3 of 3)
        run: |
          git diff --exit-code || (echo "::error:: merge canary and run codegen again" && exit 1)

  runtime-tests:
    name: "BAML Runtime / Tests"
    runs-on: ubuntu-latest
    needs: determine_changes
    if: |
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/canary' ||
        needs.determine_changes.outputs.engine == 'true' ||
        needs.determine_changes.outputs.python_integ == 'true'
      )
    strategy:
      matrix:
        test-suite: [rust-unit, python-integration]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Tools
        uses: ./.github/actions/setup-tools

      - name: Setup Rust
        if: |
          (matrix.test-suite == 'rust-unit' && needs.determine_changes.outputs.engine == 'true') ||
          (matrix.test-suite == 'python-integration' && needs.determine_changes.outputs.python_integ == 'true')
        uses: ./.github/actions/setup-rust

      - name: Setup Go
        if: |
          (matrix.test-suite == 'rust-unit' && needs.determine_changes.outputs.engine == 'true') ||
          (matrix.test-suite == 'python-integration' && needs.determine_changes.outputs.python_integ == 'true')
        uses: ./.github/actions/setup-go

      - name: Setup Node.js
        if: matrix.test-suite == 'python-integration' && needs.determine_changes.outputs.python_integ == 'true'
        uses: ./.github/actions/setup-node

      - name: Setup Python
        if: |
          (matrix.test-suite == 'rust-unit' && needs.determine_changes.outputs.engine == 'true') ||
          (matrix.test-suite == 'python-integration' && needs.determine_changes.outputs.python_integ == 'true')
        uses: ./.github/actions/setup-python
        with:
          cache: "false"

      - name: Setup Ruby
        if: matrix.test-suite == 'rust-unit' && needs.determine_changes.outputs.engine == 'true'
        uses: ./.github/actions/setup-ruby

      - name: Run Rust unit tests
        if: matrix.test-suite == 'rust-unit' && needs.determine_changes.outputs.engine == 'true'
        run: |
          # Find Ruby library path and add it to LD_LIBRARY_PATH
          RUBY_LIB_PATH=$(ruby -e 'puts RbConfig::CONFIG["libdir"]')
          export LD_LIBRARY_PATH="${RUBY_LIB_PATH}:${LD_LIBRARY_PATH}"
          # Build baml_cffi shared library
          cargo build --package baml_cffi
          echo "Listing release directory:"
          ls -la engine/target/release/libbaml_cffi.* || true
          ls -la engine/target/release/baml_cffi.* || true

          export BAML_LIBRARY_PATH=${{ github.workspace }}/engine/target/debug/libbaml_cffi.so
          # Run tests
          echo "BAML_LIBRARY_PATH=${{ github.workspace }}/engine/target/debug/libbaml_cffi.so" >> $GITHUB_ENV
          cargo test --features skip-integ-tests --verbose -- --nocapture
        working-directory: engine

      - name: Run Python integration tests
        if: matrix.test-suite == 'python-integration' && needs.determine_changes.outputs.python_integ == 'true'
        run: |
          cd integ-tests/python && ./run_tests.sh

  test-summary:
    name: "Test Summary"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - cargo-tests
      - beps
      - docs
      - benchmarks-instrumented
      - runtime-lint
      - runtime-typecheck
      - runtime-build-wasm
      - runtime-test-generators
      - runtime-tests
    steps:
      - name: "Check test results"
        run: |
          if [[ "${{ needs.cargo-tests.result }}" != "success" && "${{ needs.cargo-tests.result }}" != "skipped" ]]; then
            echo "::error::Cargo tests failed"
            exit 1
          fi

          if [[ "${{ needs.beps.result }}" != "success" && "${{ needs.beps.result }}" != "skipped" ]]; then
            echo "::error::BEPs workflow failed"
            exit 1
          fi

          if [[ "${{ needs.docs.result }}" != "success" && "${{ needs.docs.result }}" != "skipped" ]]; then
            echo "::error::Docs workflow failed"
            exit 1
          fi

          if [[ "${{ needs.benchmarks-instrumented.result }}" != "success" && "${{ needs.benchmarks-instrumented.result }}" != "skipped" ]]; then
            echo "::error::Benchmarks failed"
            exit 1
          fi

          if [[ "${{ needs.runtime-lint.result }}" != "success" && "${{ needs.runtime-lint.result }}" != "skipped" ]]; then
            echo "::error::BAML Runtime lint failed"
            exit 1
          fi

          if [[ "${{ needs.runtime-typecheck.result }}" != "success" && "${{ needs.runtime-typecheck.result }}" != "skipped" ]]; then
            echo "::error::BAML Runtime typecheck failed"
            exit 1
          fi

          if [[ "${{ needs.runtime-build-wasm.result }}" != "success" && "${{ needs.runtime-build-wasm.result }}" != "skipped" ]]; then
            echo "::error::BAML Runtime WASM build failed"
            exit 1
          fi

          if [[ "${{ needs.runtime-test-generators.result }}" != "success" && "${{ needs.runtime-test-generators.result }}" != "skipped" ]]; then
            echo "::error::BAML Runtime generator tests failed"
            exit 1
          fi

          if [[ "${{ needs.runtime-tests.result }}" != "success" && "${{ needs.runtime-tests.result }}" != "skipped" ]]; then
            echo "::error::BAML Runtime tests failed"
            exit 1
          fi

          echo "All required checks passed!"
