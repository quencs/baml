name: BAML Release

on:
  workflow_dispatch:
    inputs:
      force_publish_vscode:
        description: "Force publish to VSCode Marketplace and Open VSX"
        type: boolean
        required: false
        default: false
  # need to run this periodically on the default branch to populate the build cache
  schedule:
    # daily at 2am PST
    - cron: 0 10 * * *
  push:
    tags:
      - "test-release/*.*"
      - "*.*"
    branches:
      - gofix2
concurrency:
  # No suffix specified - in reusable workflows we need a statically-defined suffix
  # to prevent workflow_call workflows from triggering a concurrency deadlock
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version_string: ${{ steps.set-version.outputs.version }}
      is_release_tag: ${{ steps.set-version.outputs.is_release_tag }}
    steps:
      - name: Set Version Info
        id: set-version
        run: |
          VERSION="0.1.0" # Default version
          IS_RELEASE="false"
          REF_NAME="${{ github.ref_name }}"
          REF_TYPE="${{ github.ref_type }}"

          if [[ "$REF_TYPE" == "branch" ]]; then
            # If it's a branch, keep the version as the default
            : # No-op, version remains "canary"
          elif [[ "$REF_TYPE" == "tag" ]];
          then
            # Use sanitized tag name for version initially
            VERSION=$(echo "$REF_NAME" | sed 's|/|-|g')
            # Check if it's a release tag matching vX.Y.Z
            if [[ "$REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              IS_RELEASE="true"
              # Use the exact tag name for releases
              VERSION="$REF_NAME"
            fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_release_tag=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "Determined version: $VERSION"
          echo "Is release tag: $IS_RELEASE"

  build-python-release:
    uses: ./.github/workflows/build-python-release.reusable.yaml

  # build-ruby-release:
  #   uses: ./.github/workflows/build-ruby-release.reusable.yaml

  build-typescript-release:
    uses: ./.github/workflows/build-typescript-release.reusable.yaml

  build-cli:
    needs: determine-version
    uses: ./.github/workflows/build-cli-release.reusable.yaml
    with:
      version: ${{ needs.determine-version.outputs.version_string }}
      package_for_release: true

  # This job now calls the reusable workflow which contains the matrix strategy
  build-vscode-reusable: # Renamed job for clarity
    needs: [determine-version, build-cli]
    uses: ./.github/workflows/build-vscode-release.reusable.yaml
    with:
      # No artifact_name needed here anymore
      version: ${{ needs.determine-version.outputs.version_string }}
      # Pass the boolean output directly
      is_release_build: ${{ needs.determine-version.outputs.is_release_tag == 'true' }}

  build-jetbrains-release:
    uses: ./.github/workflows/build-jetbrains-release.reusable.yaml

  # Kick off integration tests when we build everything.
  # This does not yet succeed/pass consistently, or even run everything, but it's a good start.
  integ-tests:
    uses: ./.github/workflows/integ-tests.yml

  # placeholder fan-in step
  all-builds:
    name: Assert all builds passed
    runs-on: ubuntu-latest
    needs:
      - determine-version
      - build-python-release
      # - build-ruby-release
      - build-typescript-release
      - build-cli
      - build-vscode-reusable # Depends on the job calling the reusable workflow
      - build-jetbrains-release
    steps:
      - run: echo "::do-nothing::" >/dev/null

  publish-to-pypi:
    environment: release
    needs: [all-builds]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      # Verify we have the expected number of wheels
      - name: Verify wheel count
        run: |
          set -euo pipefail
          ls dist/
          wheel_count=$(ls dist/*.whl 2>/dev/null | wc -l)
          if [ "$wheel_count" -lt 8 ]; then
            echo "Error: Expected at least 8 wheels, but found $wheel_count"
            exit 1
          fi
          echo "Found $wheel_count wheels"

      # authz is managed via OIDC configured at https://pypi.org/manage/project/baml-py/settings/publishing/
      # it is pinned to this github actions filename, so renaming this file is not safe!!
      - name: Publish package to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: dist/*

  publish-to-npm:
    environment: release
    needs: [all-builds]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          package_json_file: engine/language_client_typescript/package.json
          run_install: false

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: engine/language_client_typescript/pnpm-lock.yaml
          # This is load-bearing: it writes NODE_AUTH_TOKEN to .npmrc, which is what
          # npm publish relies on.
          # See https://github.com/npm/cli/issues/6184#issuecomment-1544496444
          registry-url: "https://registry.npmjs.org"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: pnpm install
        working-directory: engine/language_client_typescript

      - uses: actions/download-artifact@v4
        with:
          pattern: bindings-*
          path: engine/language_client_typescript/artifacts

      - name: create npm dirs
        run: pnpm napi create-npm-dirs
        working-directory: engine/language_client_typescript

      - name: Move artifacts
        run: pnpm artifacts
        working-directory: engine/language_client_typescript

      - name: Publish
        # This reads the credential from .npmrc, which is written by the setup-node step.
        # It does not use the NODE_AUTH_TOKEN environment variable.
        run: npm publish --access public
        working-directory: engine/language_client_typescript

  # publish-to-rubygems:
  #   environment: release
  #   needs: [all-builds]
  #   if: ${{ startsWith(github.ref, 'refs/tags/') }}
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4

  #     - uses: rubygems/configure-rubygems-credentials@main
  #       with:
  #         # https://rubygems.org/profile/oidc/api_key_roles/rg_oidc_akr_p6x4xz53qtk948na3bgy
  #         role-to-assume: rg_oidc_akr_p6x4xz53qtk948na3bgy

  #     - uses: jdx/mise-action@v2

  #     - uses: actions/download-artifact@v4
  #       with:
  #         pattern: gem-*
  #         path: engine/language_client_ruby/pkg/
  #         merge-multiple: true

  #     - working-directory: engine/language_client_ruby
  #       run: |
  #         set -euxo pipefail
  #         find pkg
  #         for i in $(ls pkg/*.gem); do
  #           gem push $i
  #         done

  publish-to-open-vsx:
    environment: release
    needs: [determine-version, all-builds] # Also need determine-version for the condition
    runs-on: ubuntu-latest
    # Updated condition to use the output from determine-version
    if: ${{ (needs.determine-version.outputs.is_release_tag == 'true') || inputs.force_publish_vscode }}
    steps:
      # No checkout needed if only publishing downloaded artifacts
      # Setup Node/PNPM/Mise only if needed to run the ovsx CLI tool
      - uses: pnpm/action-setup@v3
        with:
          version: 9.12.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          # Use pattern matching to get all target-specific VSIXs
          pattern: baml-vscode-vsix-*
          path: vsix-artifacts # Download to a dedicated directory
          merge-multiple: true # Combine artifacts from the matrix runs
      - name: List downloaded VSIXs
        run: ls -l vsix-artifacts/
      - name: Publish to open-vsx
        run: |
          # Use npx to run the globally available or project-local ovsx tool
          # Publish all downloaded VSIXs using a glob pattern
          npx ovsx publish --packagePath ./vsix-artifacts/*.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  publish-to-vscode-marketplace:
    environment: release
    needs: [determine-version, all-builds] # Also need determine-version for the condition
    runs-on: ubuntu-latest
    # Updated condition to use the output from determine-version and check for tag/force
    # if: ${{ (startsWith(github.ref, 'refs/tags/') && needs.determine-version.outputs.is_release_tag == 'true') || inputs.force_publish_vscode }}
    steps:
      # No checkout needed if only publishing downloaded artifacts
      # Setup Node/PNPM/Mise only if needed to run the vsce CLI tool
      - uses: pnpm/action-setup@v3
        with:
          version: 9.12.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          # Use pattern matching to get all target-specific VSIXs
          pattern: baml-vscode-vsix-*
          path: vsix-artifacts # Download to a dedicated directory
          merge-multiple: true # Combine artifacts from the matrix runs
      - name: List downloaded VSIXs
        run: ls -al vsix-artifacts/
      - name: Publish to VSCode Marketplace
        run: |
          # Use npx to run the vsce tool
          # Publish all downloaded VSIXs using a glob pattern
          npx @vscode/vsce publish --packagePath ./vsix-artifacts/*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCODE_PAT }}

  publish-to-jetbrains-marketplace:
    environment: release
    needs: [determine-version, all-builds] # Also need determine-version for the condition
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./jetbrains
    steps:
      # We need checkout, java, and gradle because there's no CLI for publishing
      # to JetBrains Marketplace, just a gradle task in the project.
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 23
      - uses: gradle/actions/setup-gradle@v4

      - name: Download extension zips
        uses: actions/download-artifact@v4
        with:
          pattern: baml-jetbrains-zip-*
          path: ./jetbrains/build/distributions/
          merge-multiple: true

      - name: List downloaded extension zips
        run: ls -al ./jetbrains/build/distributions/

      - name: Publish to JetBrains Marketplace
        working-directory: ./jetbrains
        run: ./gradlew publishPlugin
        env:
          INTELLIJ_PLATFORM_PUBLISH_TOKEN: ${{ secrets.SAM_INTELLIJ_PLATFORM_PUBLISH_TOKEN }}

  publish-to-github:
    environment: release
    permissions:
      contents: write
    # Depend on all builds AND the version determination
    needs: [all-builds, determine-version]
    # Run regardless of tag or branch, flags will handle draft/prerelease state
    # if: ${{ startsWith(github.ref, 'refs/tags/') }} # Removed condition
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Checkout needed for CHANGELOG.md

      # Download all CLI artifacts produced by the build-cli job
      - name: Download all baml-cli artifacts
        uses: actions/download-artifact@v4
        with:
          # Match artifacts starting with 'baml-cli-'
          pattern: baml-cli-*
          # Download into this directory
          path: cli-artifacts
          merge-multiple: true # Merge artifacts from different OS/arch into the path

      # Download all CFFI library artifacts produced by the build-cli job
      - name: Download all libbaml-cffi artifacts
        uses: actions/download-artifact@v4
        with:
          # Match artifacts starting with 'libbaml-cffi-'
          pattern: libbaml-cffi-*
          # Download into a separate directory
          path: cffi-artifacts
          merge-multiple: true # Merge artifacts from different OS into the path

      - name: List downloaded CLI artifacts
        run: |
          echo "Downloaded CLI artifacts:"
          ls -R cli-artifacts/

      # Add step to list downloaded CFFI artifacts for verification
      - name: List downloaded CFFI artifacts
        run: |
          echo "Downloaded CFFI artifacts:"
          ls -R cffi-artifacts/

      # Always create the changelog file, it will be empty for non-releases
      - name: Initialize Changelog File
        run: touch CHANGELOG.txt

      # Get changelog only if it's a proper release tag
      - name: Populate Changelog File for Release
        # Condition updated to use output from determine-version
        # if: needs.determine-version.outputs.is_release_tag == 'true'
        run: |
          # Extract the latest changelog section using awk and write it to CHANGELOG.txt
          # This assumes the latest release is at the top and starts with ## [version]
          awk '/^## \[/{if (p) exit; if ($2 == "[${{ needs.determine-version.outputs.version_string }}]") p=1} p' CHANGELOG.md | sed '1d' > CHANGELOG.txt # Skip the header line itself

      - name: List CHANGELOG.txt
        run: ls -l CHANGELOG.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Use version string from determine-version job
          name: ${{ needs.determine-version.outputs.version_string }}
          tag_name: ${{ needs.determine-version.outputs.version_string }}
          # Use the generated CHANGELOG.txt file path for the body
          body_path: CHANGELOG.txt
          # Set draft and prerelease based on whether it's a release tag
          draft: ${{ needs.determine-version.outputs.is_release_tag == 'false' }}
          prerelease: ${{ needs.determine-version.outputs.is_release_tag == 'false' }}
          # Upload all files from the cli-artifacts and cffi-artifacts directories
          files: |
            cli-artifacts/**/*
            cffi-artifacts/**/*
          fail_on_unmatched_files: true
          # Use default GITHUB_TOKEN
          token: ${{ secrets.GITHUB_TOKEN }}
          # Do not auto-generate release notes, rely on changelog or empty body
          generate_release_notes: false
